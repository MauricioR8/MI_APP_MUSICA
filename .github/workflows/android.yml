name: Android CI - Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 'write' is required so the workflow can publish the APK as a GitHub Release asset.
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Cada build produce una version distinta (numero de ejecucion del workflow).
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: 1.0.${{ github.run_number }}

jobs:
  build:
    name: Assemble & publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Lint (report only, non-blocking)
        run: ./gradlew :app:lintDebug --stacktrace
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      # Nombres de archivo unicos por version (no se repiten entre builds).
      - name: Collect APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "dist/MI_APP_MUSICA-v${VERSION_NAME}-debug.apk"
          cp app/build/outputs/apk/release/app-release.apk \
             "dist/MI_APP_MUSICA-v${VERSION_NAME}-release.apk"
          ls -lh dist

      # ---- Artefactos de Actions (respaldo) ----
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MI_APP_MUSICA-v${{ env.VERSION_NAME }}-debug
          path: dist/MI_APP_MUSICA-v${{ env.VERSION_NAME }}-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MI_APP_MUSICA-v${{ env.VERSION_NAME }}-release
          path: dist/MI_APP_MUSICA-v${{ env.VERSION_NAME }}-release.apk
          if-no-files-found: error
          retention-days: 30

      # ---- Descarga directa: una Release NUEVA por cada build (nombre/tag unicos) ----
      # 'releases/latest' siempre apunta a la mas reciente, pero cada version tiene su
      # propio nombre/tag para que nunca descargues la misma dos veces.
      - name: Publish unique GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "MI APP MUSICA v${{ env.VERSION_NAME }}"
          body: |
            Version v${{ env.VERSION_NAME }} (build #${{ github.run_number }}).
            Generada automaticamente desde el commit ${{ github.sha }}.

            - **MI_APP_MUSICA-v${{ env.VERSION_NAME }}-debug.apk**: depuracion, instalable directamente.
            - **MI_APP_MUSICA-v${{ env.VERSION_NAME }}-release.apk**: optimizada (R8), firmada con la debug key.

            Descarga el .apk de abajo, transfierelo al telefono e instalalo
            (habilita "instalar apps de origen desconocido" si el sistema lo pide).
          files: |
            dist/MI_APP_MUSICA-v${{ env.VERSION_NAME }}-debug.apk
            dist/MI_APP_MUSICA-v${{ env.VERSION_NAME }}-release.apk
          make_latest: true
          fail_on_unmatched_files: true
