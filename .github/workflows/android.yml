name: Android CI - Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 'write' is required so the workflow can publish the APK as a GitHub Release asset.
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Cada build produce una version distinta (numero de ejecucion del workflow).
  VERSION_CODE: ${{ github.run_number }}
  VERSION_NAME: 1.0.${{ github.run_number }}

jobs:
  build:
    name: Assemble & publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      # El build de release no debe bloquear la publicacion. Si fallara, igual publicamos el debug.
      - name: Build release APK
        id: release_build
        continue-on-error: true
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "dist/MI_APP_MUSICA-v${VERSION_NAME}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "dist/MI_APP_MUSICA-v${VERSION_NAME}-release.apk"
          fi
          ls -lh dist

      # ---- Artefactos de Actions (respaldo) ----
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MI_APP_MUSICA-v${{ env.VERSION_NAME }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 60

      # ---- Apartado "Versiones": una Release NUEVA por cada build (nombre/tag unicos) ----
      # 'releases/latest' apunta a la mas reciente; el historial completo queda en /releases.
      - name: Publish unique GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "MI APP MUSICA v${{ env.VERSION_NAME }}"
          body: |
            Version v${{ env.VERSION_NAME }} (build #${{ github.run_number }}).
            Generada automaticamente desde el commit ${{ github.sha }}.

            Descarga el archivo .apk de abajo, transfierelo al telefono e instalalo
            (habilita "instalar apps de origen desconocido" si el sistema lo pide).

            - **-debug.apk**: version de depuracion, siempre disponible.
            - **-release.apk**: version optimizada (se publica si el build de release tiene exito).
          files: |
            dist/*.apk
          make_latest: true
          fail_on_unmatched_files: false
